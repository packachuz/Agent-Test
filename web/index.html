<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Agent IT Team</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b0d10; color: #e6e8eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    * { box-sizing: border-box; }
    #root { height: 100vh; }
    .app { height: 100vh; }
    #boot { padding: 20px; font-size: 13px; line-height: 1.5; font-family: ui-monospace, monospace; }
    #boot h1 { font-family: -apple-system, sans-serif; font-size: 16px; margin: 0 0 12px; color: #fff; }
    #boot .row { color: #8a93a0; padding: 2px 0; }
    #boot .row.ok { color: #7aa2f7; }
    #boot .row.err { color: #ff6b7b; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot">
      <h1>Loading dashboard…</h1>
      <div id="boot-rows"></div>
    </div>
  </div>

  <script>
    (function () {
      var rowsEl = document.getElementById('boot-rows');
      var rows = {};
      function add(key, label) {
        var d = document.createElement('div');
        d.className = 'row';
        d.textContent = label + ' · waiting';
        rowsEl.appendChild(d);
        rows[key] = { el: d, label: label, done: false };
      }
      function set(key, status, extra) {
        var r = rows[key]; if (!r || r.done) return;
        r.done = true;
        r.el.className = 'row ' + (status === 'ok' ? 'ok' : 'err');
        r.el.textContent = r.label + ' · ' + status + (extra ? ' · ' + extra : '');
      }
      function addErr(msg) {
        var d = document.createElement('div');
        d.className = 'row err';
        d.textContent = msg;
        rowsEl.appendChild(d);
      }
      window.addEventListener('error', function (e) {
        addErr('[onerror] ' + (e.message || e.type) +
          (e.filename ? ' @ ' + e.filename.split('/').slice(-2).join('/') : '') +
          (e.lineno ? ':' + e.lineno : ''));
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        addErr('[reject] ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
      });

      var scripts = [
        ['react',     'https://unpkg.com/react@18.3.1/umd/react.production.min.js'],
        ['react-dom', 'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js'],
        ['shared',    'js/shared.js'],
        ['dashboard', 'js/pages/dashboard.js'],
        ['submit',    'js/pages/submit.js'],
        ['run-detail','js/pages/run-detail.js'],
        ['memory',    'js/pages/memory.js'],
        ['agents',    'js/pages/agents.js'],
        ['login',     'js/pages/login.js'],
        ['app',       'js/app.js'],
      ];
      scripts.forEach(function (s) { add(s[0], s[0]); });

      function loadOne(i) {
        if (i >= scripts.length) {
          // Give app.jsx a tick to call ReactDOM.createRoot().render()
          setTimeout(function () {
            if (document.querySelector('#root .app') || !document.getElementById('boot')) {
              // SPA mounted; nothing to do.
            } else {
              addErr('[stuck] all scripts loaded but SPA did not render. ' +
                'DashboardPage=' + (typeof window.DashboardPage) +
                ' App-mount: check ReactDOM.createRoot in app.js');
            }
          }, 250);
          return;
        }
        var s = scripts[i];
        var el = document.createElement('script');
        el.src = s[1];
        if (s[1].indexOf('http') === 0) el.crossOrigin = 'anonymous';
        el.onload  = function () { set(s[0], 'ok'); loadOne(i + 1); };
        el.onerror = function () { set(s[0], 'FAILED', s[1]); /* keep going so we see all failures */ loadOne(i + 1); };
        document.body.appendChild(el);
      }
      loadOne(0);
    })();
  </script>
</body>
</html>
