<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Agent IT Team</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b0d10; color: #e6e8eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    * { box-sizing: border-box; }
    #root { height: 100vh; }
    .app { height: 100vh; }
    #boot { padding: 24px; font-size: 14px; line-height: 1.5; }
    #boot .step { color: #8a93a0; margin: 4px 0; font-family: ui-monospace, monospace; font-size: 12px; }
    #boot .err  { color: #ff6b7b; white-space: pre-wrap; word-break: break-word; }
    #boot .ok   { color: #7aa2f7; }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot">
      <div><strong>Loading dashboard…</strong></div>
      <div class="step" id="boot-html">html · loaded</div>
      <div class="step" id="boot-react">react · waiting</div>
      <div class="step" id="boot-dom">react-dom · waiting</div>
      <div class="step" id="boot-babel">babel · waiting</div>
      <div class="step" id="boot-app">app · waiting</div>
      <div class="step err" id="boot-err"></div>
    </div>
  </div>
  <script>
    (function () {
      var errEl = document.getElementById('boot-err');
      window.addEventListener('error', function (e) {
        if (!errEl) return;
        errEl.textContent += '[error] ' + (e.message || e.type) +
          (e.filename ? ' @ ' + e.filename.split('/').slice(-2).join('/') : '') +
          (e.lineno ? ':' + e.lineno : '') + '\n';
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        if (!errEl) return;
        errEl.textContent += '[reject] ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '\n';
      });
      function watch(id, check) {
        var t0 = Date.now();
        var iv = setInterval(function () {
          if (check()) {
            clearInterval(iv);
            var el = document.getElementById(id);
            if (el) { el.textContent = el.textContent.replace(/waiting$/, 'ok'); el.className = 'step ok'; }
          } else if (Date.now() - t0 > 8000) {
            clearInterval(iv);
            var el = document.getElementById(id);
            if (el) { el.textContent = el.textContent.replace(/waiting$/, 'TIMEOUT (8s)'); el.className = 'step err'; }
          }
        }, 100);
      }
      watch('boot-react', function () { return typeof React !== 'undefined'; });
      watch('boot-dom',   function () { return typeof ReactDOM !== 'undefined'; });
      watch('boot-babel', function () { return typeof Babel !== 'undefined'; });
      watch('boot-app',   function () { return typeof window.DashboardPage === 'function'; });
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- load order matters: shared → pages → app -->
  <script type="text/babel" src="js/shared.jsx"></script>
  <script type="text/babel" src="js/pages/dashboard.jsx"></script>
  <script type="text/babel" src="js/pages/submit.jsx"></script>
  <script type="text/babel" src="js/pages/run-detail.jsx"></script>
  <script type="text/babel" src="js/pages/memory.jsx"></script>
  <script type="text/babel" src="js/pages/agents.jsx"></script>
  <script type="text/babel" src="js/pages/login.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
