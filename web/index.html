<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Agent IT Team</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-base); }
    * { box-sizing: border-box; }
    #root { height: 100vh; }
    .app { height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- load order matters: shared → pages → app -->
  <script type="text/babel" src="js/shared.jsx"></script>
  <script type="text/babel" src="js/pages/dashboard.jsx"></script>
  <script type="text/babel" src="js/pages/submit.jsx"></script>
  <script type="text/babel" src="js/pages/run-detail.jsx"></script>
  <script type="text/babel" src="js/pages/memory.jsx"></script>
  <script type="text/babel" src="js/pages/agents.jsx"></script>
  <script type="text/babel" src="js/pages/login.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
