name: CTO Run

# Manual-only triggers per grill-me Q2. No cron, no issue-label triggers in
# Phase 1. Trigger from GitHub Actions UI (works on mobile).
on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Requirement title (one line)'
        required: true
        type: string
      description:
        description: 'Requirement description'
        required: true
        type: string
      priority:
        description: 'Priority'
        required: true
        type: choice
        default: medium
        options: [low, medium, high]
      touches:
        description: 'Comma-separated services/paths (optional)'
        required: false
        type: string
      target_repo_url:
        description: 'Target repo URL (optional, https://github.com/<org>/<name>)'
        required: false
        type: string
      fixture:
        description: 'Fixture name (small-bugfix, high-severity-bug) — overrides inputs'
        required: false
        type: string

# Per grill-me Q7: serial execution. If a run is in flight, the next one waits.
concurrency:
  group: cto-run
  cancel-in-progress: false

# Default GITHUB_TOKEN scope needed to branch, push, open PR, label, assign,
# and open the cto-failed issue on crash.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    # Feature flag (grill-me Q15). Set `CTO_CLOUD_ENABLED=true` as a repo
    # variable to enable the loop. Anything else, including unset, skips.
    if: ${{ vars.CTO_CLOUD_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
      CTO_CLOUD_ENABLED: 'true'
      INTAKE_TITLE:       ${{ inputs.title }}
      INTAKE_DESCRIPTION: ${{ inputs.description }}
      INTAKE_PRIORITY:    ${{ inputs.priority }}
      INTAKE_TOUCHES:     ${{ inputs.touches }}
      INTAKE_TARGET_REPO_URL: ${{ inputs.target_repo_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create cto-task   --color 1f883d --description "CTO agent run"   --force || true
          gh label create cto-failed --color d1242f --description "CTO run failed"   --force || true

      - name: Install deps
        run: npm ci || npm install

      - name: Configure git identity
        run: |
          git config user.name  "cto-agent[bot]"
          git config user.email "cto-agent[bot]@users.noreply.github.com"

      - name: Create feat branch
        id: branch
        run: |
          BRANCH="feat/cto-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run CTO pipeline
        id: pipeline
        run: |
          if [ -n "${{ inputs.fixture }}" ]; then
            npx tsx agent/cto/index.ts --fixture=${{ inputs.fixture }}
          else
            npx tsx agent/cto/index.ts --intake=workflow
          fi

      - name: Commit pipeline outputs
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes from pipeline."
            exit 0
          fi
          git commit -m "cto: $(echo '${{ inputs.title }}' | head -c 60)"
          git push -u origin "${{ steps.branch.outputs.name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "cto: ${{ inputs.title }}" \
            --body "Generated by CTO Run workflow (priority: ${{ inputs.priority }}).

          Triggered by: @${{ github.actor }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          See \`runs/*.jsonl\` for the full event timeline and \`memory/decisions.md\` for any new ADR." \
            --label "cto-task"
          # Assignee + reviewer are best-effort: GitHub rejects self-review in
          # some configs, and a failure here must not fail the run.
          gh pr edit "${{ steps.branch.outputs.name }}" --add-assignee "${{ github.actor }}" || true
          gh pr edit "${{ steps.branch.outputs.name }}" --add-reviewer "${{ github.actor }}" || true

      - name: Open failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "CTO run failed: ${{ inputs.title || inputs.fixture }}" \
            --label "cto-failed" \
            --assignee "${{ github.actor }}" \
            --body "CTO pipeline crashed. See workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Trigger inputs:
          - title: ${{ inputs.title }}
          - priority: ${{ inputs.priority }}
          - fixture: ${{ inputs.fixture }}" || true
